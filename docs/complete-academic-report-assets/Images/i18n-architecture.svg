<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #333; }
      .label { font-family: Arial, sans-serif; font-size: 12px; fill: #555; }
      .small-text { font-family: Arial, sans-serif; font-size: 10px; fill: #777; }
      .component { fill: #e8f4fd; stroke: #2196f3; stroke-width: 2; }
      .file { fill: #fff3e0; stroke: #ff9800; stroke-width: 2; }
      .flow { fill: #f3e5f5; stroke: #9c27b0; stroke-width: 2; }
      .arrow { stroke: #4caf50; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .dashed-arrow { stroke: #ff5722; stroke-width: 2; fill: none; stroke-dasharray: 5,5; marker-end: url(#arrowhead2); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#4caf50"/>
    </marker>
    <marker id="arrowhead2" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#ff5722"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="title">Internationalization (i18n) Architecture</text>

  <!-- React Components -->
  <rect x="50" y="60" width="180" height="80" rx="5" class="component"/>
  <text x="140" y="85" text-anchor="middle" class="label">React Components</text>
  <text x="140" y="105" text-anchor="middle" class="small-text">LandingPage.jsx</text>
  <text x="140" y="120" text-anchor="middle" class="small-text">Login.jsx</text>
  <text x="140" y="135" text-anchor="middle" class="small-text">CitizenDashboard.jsx</text>

  <!-- Language Selector -->
  <rect x="290" y="60" width="140" height="80" rx="5" class="component"/>
  <text x="360" y="85" text-anchor="middle" class="label">LanguageSelector</text>
  <text x="360" y="105" text-anchor="middle" class="small-text">Component</text>
  <text x="360" y="120" text-anchor="middle" class="small-text">Dropdown UI</text>
  <text x="360" y="135" text-anchor="middle" class="small-text">English/ಕನ್ನಡ/தமிழ்</text>

  <!-- i18next Core -->
  <rect x="490" y="60" width="180" height="80" rx="5" class="flow"/>
  <text x="580" y="85" text-anchor="middle" class="label">react-i18next Core</text>
  <text x="580" y="105" text-anchor="middle" class="small-text">useTranslation() Hook</text>
  <text x="580" y="120" text-anchor="middle" class="small-text">Language Detection</text>
  <text x="580" y="135" text-anchor="middle" class="small-text">Caching System</text>

  <!-- Translation Files -->
  <rect x="50" y="200" width="100" height="120" rx="5" class="file"/>
  <text x="100" y="220" text-anchor="middle" class="label">en.json</text>
  <text x="100" y="240" text-anchor="middle" class="small-text">English</text>
  <text x="100" y="255" text-anchor="middle" class="small-text">Translations</text>

  <rect x="180" y="200" width="100" height="120" rx="5" class="file"/>
  <text x="230" y="220" text-anchor="middle" class="label">kn.json</text>
  <text x="230" y="240" text-anchor="middle" class="small-text">Kanglish</text>
  <text x="230" y="255" text-anchor="middle" class="small-text">ವೇಸ್ಟ್ ಮ್ಯಾನೇಜ್ಮೆಂಟ್</text>
  <text x="230" y="270" text-anchor="middle" class="small-text">ಸ್ಟಾರ್ಟ್ ಮಾಡಿ</text>
  <text x="230" y="285" text-anchor="middle" class="small-text">ಸೈನ್ ಇನ್</text>

  <rect x="310" y="200" width="100" height="120" rx="5" class="file"/>
  <text x="360" y="220" text-anchor="middle" class="label">ta.json</text>
  <text x="360" y="240" text-anchor="middle" class="small-text">Tanglish</text>
  <text x="360" y="255" text-anchor="middle" class="small-text">வேஸ்ட் மேனேஜ்மென்ட்</text>
  <text x="360" y="270" text-anchor="middle" class="small-text">ஸ்டார்ட் பண்ணு</text>
  <text x="360" y="285" text-anchor="middle" class="small-text">சைன் இன்</text>

  <!-- i18n Configuration -->
  <rect x="490" y="200" width="180" height="80" rx="5" class="flow"/>
  <text x="580" y="225" text-anchor="middle" class="label">i18n Configuration</text>
  <text x="580" y="245" text-anchor="middle" class="small-text">/i18n/index.js</text>
  <text x="580" y="260" text-anchor="middle" class="small-text">Language Resources</text>
  <text x="580" y="275" text-anchor="middle" class="small-text">Detector Setup</text>

  <!-- Browser Storage -->
  <rect x="290" y="360" width="140" height="80" rx="5" class="component"/>
  <text x="360" y="385" text-anchor="middle" class="label">Browser Storage</text>
  <text x="360" y="405" text-anchor="middle" class="small-text">localStorage</text>
  <text x="360" y="420" text-anchor="middle" class="small-text">Language Cache</text>

  <!-- User Interface -->
  <rect x="50" y="360" width="140" height="80" rx="5" class="component"/>
  <text x="120" y="385" text-anchor="middle" class="label">User Interface</text>
  <text x="120" y="405" text-anchor="middle" class="small-text">Rendered Text</text>
  <text x="120" y="420" text-anchor="middle" class="small-text">Real-time Updates</text>

  <!-- Arrows -->
  <!-- Components to i18next -->
  <path d="M 230 100 L 490 100" class="arrow"/>
  <text x="360" y="95" text-anchor="middle" class="small-text">t('key')</text>

  <!-- Language Selector to i18next -->
  <path d="M 430 100 L 490 100" class="arrow"/>
  <text x="460" y="95" text-anchor="middle" class="small-text">changeLanguage</text>

  <!-- i18next to Translation Files -->
  <path d="M 580 140 L 580 180 L 360 180 L 360 200" class="arrow"/>
  <text x="470" y="175" text-anchor="middle" class="small-text">loadTranslations</text>

  <!-- Translation Files to i18n Config -->
  <path d="M 410 260 L 490 260" class="arrow"/>
  <text x="450" y="255" text-anchor="middle" class="small-text">resource files</text>

  <!-- i18next to Browser Storage -->
  <path d="M 580 280 L 580 320 L 360 320 L 360 360" class="dashed-arrow"/>
  <text x="470" y="315" text-anchor="middle" class="small-text">cache language</text>

  <!-- Browser Storage to UI -->
  <path d="M 290 400 L 190 400" class="arrow"/>
  <text x="240" y="395" text-anchor="middle" class="small-text">persisted choice</text>

  <!-- i18next to UI -->
  <path d="M 490 240 L 190 240 L 190 360" class="arrow"/>
  <text x="340" y="235" text-anchor="middle" class="small-text">translated text</text>

  <!-- Legend -->
  <rect x="50" y="500" width="700" height="80" rx="5" fill="#f9f9f9" stroke="#ccc"/>
  <text x="60" y="520" class="label">Legend:</text>
  <rect x="70" y="530" width="30" height="15" class="component"/>
  <text x="105" y="542" class="small-text">React Components</text>
  
  <rect x="220" y="530" width="30" height="15" class="file"/>
  <text x="255" y="542" class="small-text">Translation Files</text>
  
  <rect x="370" y="530" width="30" height="15" class="flow"/>
  <text x="405" y="542" class="small-text">i18next Framework</text>
  
  <line x1="520" y1="537" x2="550" y2="537" class="arrow"/>
  <text x="555" y="542" class="small-text">Data Flow</text>
  
  <line x1="640" y1="537" x2="670" y2="537" class="dashed-arrow"/>
  <text x="675" y="542" class="small-text">Caching</text>
</svg>
